name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ] # Se lance à chaque push sur ces branches

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Installer Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # Ajoutez ici vos autres bibliothèques si besoin :
        # pip install requests 

    - name: Créer le fichier EXE
      run: pyinstaller --onefile --windowed main.py 
      # Remplacez "main.py" par le nom de votre script principal

    - name: Sauvegarder l'exécutable
      uses: actions/upload-artifact@v4
      with:
        name: MonLogiciel-EXE
        path: dist/*.exe
